<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>打卡</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .fade { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; } }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
  </style>
</head>
<body class="min-h-screen flex p-4 overflow-x-hidden">

<!-- Loading -->
<div id="s-loading" class="text-center fade m-auto">
  <div class="text-5xl mb-4 pulse">📍</div>
  <p class="text-gray-500 font-medium">取得 GPS 位置中...</p>
  <p class="text-gray-300 text-xs mt-2">請確認已允許位置權限</p>
</div>

<!-- Confirm -->
<div id="s-confirm" class="hidden w-full max-w-sm fade m-auto">
  <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
    <div id="header-bar" class="px-6 py-5 text-white text-center">
      <div id="header-icon" class="text-4xl mb-1"></div>
      <h1 id="header-title" class="text-xl font-bold"></h1>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div class="flex items-center gap-3">
        <img id="emp-avatar" src="" class="w-10 h-10 rounded-full bg-gray-100 object-cover"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect width=%2240%22 height=%2240%22 fill=%22%23e5e7eb%22/><text x=%2220%22 y=%2226%22 font-size=%2216%22 text-anchor=%22middle%22 fill=%22%239ca3af%22>👤</text></svg>'">
        <div>
          <p class="font-semibold text-gray-800" id="emp-name">載入中...</p>
          <p class="text-xs text-gray-400" id="emp-dept"></p>
        </div>
      </div>
      <hr class="border-gray-100">
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-400">打卡時間</span>
        <span id="current-time" class="font-mono font-bold text-gray-800 text-lg"></span>
      </div>
      <div>
        <div class="flex items-center justify-between mb-1">
          <span class="text-sm text-gray-400">GPS 位置</span>
          <span id="gps-accuracy" class="text-xs text-gray-300"></span>
        </div>
        <p id="gps-coords" class="text-xs font-mono text-gray-500 bg-gray-50 rounded-lg px-3 py-2">定位中...</p>
      </div>
      <div id="meal-toggle" class="hidden">
        <p id="meal-question" class="text-sm text-gray-600 font-medium mb-2">今天中午要用餐嗎？</p>
        <div class="flex gap-2">
          <button type="button" id="meal-yes" onclick="setMeal(true)" class="flex-1 py-2.5 rounded-lg text-sm font-medium border border-gray-200 transition">要用餐</button>
          <button type="button" id="meal-no" onclick="setMeal(false)" class="flex-1 py-2.5 rounded-lg text-sm font-medium border border-gray-200 transition">不用餐</button>
        </div>
        <p id="meal-hint" class="text-xs text-gray-400 mt-1"></p>
      </div>
      <div id="fence-warning" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-3">
        <p class="text-amber-700 text-sm font-medium">⚠️ 不在打卡範圍內</p>
        <p id="fence-detail" class="text-amber-600 text-xs mt-0.5"></p>
      </div>
      <div id="fence-blocked" class="hidden bg-red-50 border border-red-200 rounded-xl p-3">
        <p class="text-red-700 text-sm font-medium">🚫 無法打卡</p>
        <p id="fence-blocked-detail" class="text-red-600 text-xs mt-0.5"></p>
      </div>
    </div>
    <div class="px-6 pb-6 space-y-2">
      <button id="confirm-btn" onclick="submit()"
        class="w-full py-4 rounded-xl font-bold text-white text-base transition active:scale-95">
        確認打卡
      </button>
      <button onclick="openForgot()"
        class="w-full py-2 text-sm text-amber-500 hover:text-amber-600 transition">
        📝 忘記打卡？申請補打卡
      </button>
      <button onclick="tryClose()" class="w-full py-2 text-sm text-gray-300 hover:text-gray-500">
        取消
      </button>
    </div>
  </div>
</div>

<!-- Forgot Punch Form -->
<div id="s-forgot" class="hidden w-full max-w-sm fade m-auto">
  <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
    <div class="px-6 py-5 text-white text-center" style="background:linear-gradient(135deg,#D97706,#B45309)">
      <div class="text-4xl mb-1">📝</div>
      <h1 class="text-xl font-bold">補打卡申請</h1>
      <p class="text-sm opacity-80 mt-0.5">忘記打卡可在此提出申請</p>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div class="flex items-center gap-3">
        <img id="forgot-avatar" src="" class="w-10 h-10 rounded-full bg-gray-100 object-cover">
        <p class="font-semibold text-gray-800" id="forgot-name"></p>
      </div>
      <hr class="border-gray-100">
      <div>
        <label class="text-sm text-gray-600 mb-1 block">補打類型</label>
        <select id="forgot-type" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base"
          onchange="onForgotTypeChange()">
          <option value="checkin">補上班打卡（08:00）</option>
          <option value="checkout">補下班打卡（17:00）</option>
          <option value="ot_checkin">補打加班上班卡（17:30）</option>
          <option value="ot_checkout">補打加班下班卡（不限）</option>
        </select>
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">補打日期</label>
        <input type="date" id="forgot-date"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base">
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">申請打卡時間</label>
        <input type="time" id="forgot-time"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base">
        <p id="forgot-time-hint" class="text-xs text-gray-400 mt-1"></p>
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">忘記打卡原因 <span class="text-red-400">*</span></label>
        <textarea id="forgot-reason" rows="3" placeholder="請說明忘記打卡的原因..."
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base resize-none focus:outline-none focus:ring-2 focus:ring-amber-400"></textarea>
      </div>
    </div>
    <div class="px-6 pb-6 space-y-2">
      <button id="forgot-submit-btn" onclick="submitForgot()"
        class="w-full py-3 rounded-xl font-bold text-white text-base transition active:scale-95"
        style="background:linear-gradient(135deg,#D97706,#B45309)">
        提交申請
      </button>
      <button onclick="show('confirm')" class="w-full py-2 text-sm text-gray-300 hover:text-gray-500">
        返回打卡頁面
      </button>
    </div>
  </div>
</div>

<!-- Overtime Form -->
<div id="s-overtime" class="hidden w-full max-w-sm fade m-auto">
  <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
    <div class="px-6 py-5 text-white text-center" style="background:linear-gradient(135deg,#F59E0B,#D97706)">
      <div class="text-4xl mb-1">⏰</div>
      <h1 class="text-xl font-bold">加班單</h1>
      <p class="text-sm opacity-80 mt-0.5">選擇加班日期與時段</p>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div class="flex items-center gap-3">
        <img id="ot-avatar" src="" class="w-10 h-10 rounded-full bg-gray-100 object-cover">
        <p class="font-semibold text-gray-800" id="ot-name"></p>
      </div>
      <hr class="border-gray-100">
      <div>
        <label class="text-sm text-gray-600 mb-1 block">加班日期</label>
        <input type="date" id="ot-date" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm text-gray-600 mb-1 block">開始時間</label>
          <input type="time" id="ot-start" value="17:30" oninput="updateOtHours()" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base">
        </div>
        <div>
          <label class="text-sm text-gray-600 mb-1 block">結束時間</label>
          <input type="time" id="ot-end" value="19:00" oninput="updateOtHours()" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base">
        </div>
      </div>
      <p id="ot-hours" class="text-xs text-amber-600 font-medium"></p>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">加班便當</label>
        <div class="flex gap-2">
          <button type="button" id="ot-meal-yes" onclick="setOtMeal(true)" class="flex-1 py-2.5 rounded-lg text-sm font-medium border border-gray-200 transition">需要便當 🍱</button>
          <button type="button" id="ot-meal-no" onclick="setOtMeal(false)" class="flex-1 py-2.5 rounded-lg text-sm font-medium border border-gray-200 transition">不需要</button>
        </div>
        <p id="ot-meal-hint" class="text-xs text-gray-400 mt-1"></p>
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">加班原因 <span class="text-red-400">*</span></label>
        <div class="flex flex-wrap gap-1.5 mb-2" id="ot-reason-chips"></div>
        <textarea id="ot-reason" rows="2" placeholder="點上方選項，或自行輸入..." class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base resize-none focus:outline-none focus:ring-2 focus:ring-amber-400"></textarea>
      </div>
    </div>
    <div class="px-6 pb-2">
      <p class="text-[13px] text-red-600 leading-relaxed bg-red-50 border border-red-100 rounded-lg px-3 py-2">⚠️ 加班時段（幾點到幾點）請<b>照實填寫</b>，作為加班費發放依據。如經查核有浮報或不實，將依公司政策處置。</p>
    </div>
    <div class="px-6 pb-6 space-y-2">
      <button id="ot-submit-btn" onclick="submitOvertime()" class="w-full py-3 rounded-xl font-bold text-white text-base transition active:scale-95" style="background:linear-gradient(135deg,#F59E0B,#D97706)">送出加班單</button>
      <button onclick="tryClose()" class="w-full py-2 text-sm text-gray-300 hover:text-gray-500">取消</button>
    </div>
  </div>
</div>

<!-- Leave Form -->
<div id="s-leave" class="hidden w-full max-w-sm fade m-auto">
  <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
    <div class="px-6 py-5 text-white text-center" style="background:linear-gradient(135deg,#3B82F6,#2563EB)">
      <div class="text-4xl mb-1">📋</div>
      <h1 class="text-xl font-bold">請假申請</h1>
      <p class="text-sm opacity-80 mt-0.5">選擇假別、日期與原因</p>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div class="flex items-center gap-3">
        <img id="lv-avatar" src="" class="w-10 h-10 rounded-full bg-gray-100 object-cover">
        <p class="font-semibold text-gray-800" id="lv-name"></p>
      </div>
      <hr class="border-gray-100">
      <div>
        <label class="text-sm text-gray-600 mb-1 block">假別</label>
        <select id="lv-type" onchange="onLeaveTypeChange()" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base">
          <option value="annual">特休假</option>
          <option value="sick">病假</option>
          <option value="personal">事假</option>
          <option value="other">其他假別</option>
        </select>
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">請假日期</label>
        <input type="date" id="lv-date" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base">
      </div>
      <div>
        <label class="text-sm text-gray-600 mb-1 block">請假原因 <span class="text-red-400">*</span></label>
        <textarea id="lv-reason" rows="2" placeholder="請說明請假原因..." class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-base resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
      </div>
      <div id="lv-doc-box" class="hidden">
        <label class="text-sm text-gray-600 mb-1 block">證明文件（選填）</label>
        <input type="file" id="lv-image" accept="image/png,image/jpeg" onchange="previewLeaveImage()" class="text-xs text-gray-600">
        <img id="lv-image-preview" class="hidden mt-2 max-h-32 rounded-lg border border-gray-200">
        <p id="lv-doc-hint" class="text-xs text-gray-400 mt-1"></p>
      </div>
    </div>
    <div class="px-6 pb-6 space-y-2">
      <button id="lv-submit-btn" onclick="submitLeaveForm()" class="w-full py-3 rounded-xl font-bold text-white text-base transition active:scale-95" style="background:linear-gradient(135deg,#3B82F6,#2563EB)">送出請假申請</button>
      <button onclick="tryClose()" class="w-full py-2 text-sm text-gray-300 hover:text-gray-500">取消</button>
    </div>
  </div>
</div>

<!-- Success -->
<div id="s-success" class="hidden text-center fade m-auto">
  <div class="text-7xl mb-4">✅</div>
  <h2 id="success-title" class="text-2xl font-bold text-gray-800 mb-2"></h2>
  <p id="success-time" class="text-gray-500"></p>
  <p id="success-note" class="text-amber-600 text-sm mt-1"></p>
  <p class="text-gray-300 text-xs mt-6">視窗即將關閉...</p>
</div>

<!-- Forgot Success -->
<div id="s-forgot-success" class="hidden text-center fade m-auto">
  <div class="text-7xl mb-4">📋</div>
  <h2 class="text-2xl font-bold text-gray-800 mb-2">申請已送出</h2>
  <p class="text-gray-500 text-sm max-w-xs mx-auto">等待主管審核，結果將透過 LINE 通知您</p>
  <p class="text-gray-300 text-xs mt-6">視窗即將關閉...</p>
</div>

<!-- Error -->
<div id="s-error" class="hidden text-center fade m-auto">
  <div class="text-6xl mb-4">❌</div>
  <h2 class="text-xl font-bold text-gray-800 mb-2">打卡失敗</h2>
  <p id="error-msg" class="text-gray-500 text-sm max-w-xs mx-auto"></p>
  <div class="mt-5 flex flex-col gap-2 items-center">
    <button onclick="openForgot()"
      class="px-6 py-2.5 rounded-xl text-sm font-medium text-white"
      style="background:linear-gradient(135deg,#D97706,#B45309)">
      📝 申請補打卡
    </button>
    <button onclick="tryClose()" class="px-6 py-2.5 bg-gray-100 rounded-xl text-sm text-gray-600 hover:bg-gray-200">
      關閉
    </button>
  </div>
</div>

<script>
const LIFF_ID = '{{LIFF_ID}}';

// Declared at module level; set inside init() AFTER liff.init() restores original query params
let action = 'checkin';
let isCheckin = true;
let mealEat = true;      // 預設要用餐
let mealKind = null;     // 'lunch' | 'ot' | null

function setMeal(eat) {
  mealEat = eat;
  const on = 'bg-green-500 text-white border-green-500', off = 'border-gray-200 text-gray-600';
  document.getElementById('meal-yes').className = `flex-1 py-2.5 rounded-lg text-sm font-medium border transition ${eat ? on : off}`;
  document.getElementById('meal-no').className = `flex-1 py-2.5 rounded-lg text-sm font-medium border transition ${!eat ? on : off}`;
  document.getElementById('meal-hint').textContent = eat ? '公司供餐，不另發津貼' : '不供餐，符合條件補 80 元伙食津貼';
}

function setupMealToggle() {
  const hour = Number(new Date().toLocaleTimeString('en-GB', { timeZone: 'Asia/Taipei', hour12: false }).slice(0, 2));
  // 只在「早上第一次上班」問中午用餐；加班便當改在「加班單」時選
  if (hour < 14) { mealKind = 'lunch'; document.getElementById('meal-question').textContent = '今天中午要用餐嗎？'; }
  else { mealKind = null; }
  const box = document.getElementById('meal-toggle');
  if (mealKind) { box.classList.remove('hidden'); setMeal(true); }
  else { box.classList.add('hidden'); }
}
let coords = null;
let accessToken = null;
let blocked = false;
let userProfile = null;

// ── UI helpers ────────────────────────────────────────
function show(name) {
  ['loading','confirm','forgot','overtime','leave','success','forgot-success','error'].forEach(s =>
    document.getElementById('s-' + s).classList.add('hidden')
  );
  document.getElementById('s-' + name).classList.remove('hidden');
}

function tryClose() {
  try { liff.closeWindow(); } catch(e) { window.close(); }
}

// ── Clock ─────────────────────────────────────────────
function startClock() {
  const el = document.getElementById('current-time');
  const tick = () => el.textContent = new Date().toLocaleTimeString('zh-TW', {
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
    timeZone: 'Asia/Taipei'
  });
  tick(); setInterval(tick, 1000);
}

// ── Haversine distance ────────────────────────────────
function calcDist(lat1, lng1, lat2, lng2) {
  const R = 6371000, d2r = Math.PI / 180;
  const dLat = (lat2 - lat1) * d2r, dLng = (lng2 - lng1) * d2r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Init ──────────────────────────────────────────────
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    // IMPORTANT: read action AFTER liff.init() — LIFF restores original query params after init
    // Before init the URL contains ?liff.state=... which doesn't have the action param
    const params = new URLSearchParams(location.search);
    action = params.get('action') || 'checkin';
    isCheckin = action === 'checkin';

    accessToken = liff.getAccessToken();
    userProfile = await liff.getProfile();

    document.getElementById('emp-avatar').src = userProfile.pictureUrl || '';
    document.getElementById('emp-name').textContent = userProfile.displayName;

    fetch('/api/emp-info?lineId=' + userProfile.userId)
      .then(r => r.json())
      .then(e => { if (e.department) document.getElementById('emp-dept').textContent = e.department; })
      .catch(() => {});

    // 直接開補打卡申請表（來自圖文選單「忘記打卡」按鈕）
    if (action === 'forgot') {
      openForgot();
      return;
    }
    if (action === 'overtime') { openOvertime(); return; }
    if (action === 'leave') { openLeave(); return; }

    const bar = document.getElementById('header-bar');
    const btn = document.getElementById('confirm-btn');
    if (isCheckin) {
      bar.style.background = 'linear-gradient(135deg, #16A34A, #15803D)';
      btn.style.background = 'linear-gradient(135deg, #16A34A, #15803D)';
      document.getElementById('header-icon').textContent = '☀️';
      document.getElementById('header-title').textContent = '上班打卡';
      btn.textContent = '確認上班打卡';
      setupMealToggle();
    } else {
      bar.style.background = 'linear-gradient(135deg, #2563EB, #1D4ED8)';
      btn.style.background = 'linear-gradient(135deg, #2563EB, #1D4ED8)';
      document.getElementById('header-icon').textContent = '🌙';
      document.getElementById('header-title').textContent = '下班打卡';
      btn.textContent = '確認下班打卡';
    }

    startClock();

    navigator.geolocation.getCurrentPosition(
      async pos => {
        coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        const acc = Math.round(pos.coords.accuracy);
        document.getElementById('gps-coords').textContent =
          `${coords.lat.toFixed(6)}, ${coords.lng.toFixed(6)}`;
        document.getElementById('gps-accuracy').textContent = `精確度 ±${acc}m`;

        try {
          const r = await fetch('/api/settings/geofence');
          const fence = await r.json();
          if (fence.enabled && fence.lat && fence.lng) {
            const dist = Math.round(calcDist(coords.lat, coords.lng, Number(fence.lat), Number(fence.lng)));
            const radius = Number(fence.radius) || 300;
            if (dist > radius) {
              if (fence.strict) {
                blocked = true;
                document.getElementById('fence-blocked').classList.remove('hidden');
                document.getElementById('fence-blocked-detail').textContent =
                  `距辦公室 ${dist} 公尺，允許範圍 ${radius} 公尺，無法打卡`;
                document.getElementById('confirm-btn').disabled = true;
                document.getElementById('confirm-btn').style.opacity = '0.4';
              } else {
                document.getElementById('fence-warning').classList.remove('hidden');
                document.getElementById('fence-detail').textContent =
                  `距辦公室 ${dist} 公尺（允許範圍 ${radius} 公尺），仍可打卡但會留下記錄`;
              }
            }
          }
        } catch(e) {}

        show('confirm');
      },
      () => {
        document.getElementById('gps-coords').textContent = '⚠️ 無法取得 GPS，請確認已允許位置權限';
        show('confirm');
      },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );

  } catch(err) {
    document.getElementById('error-msg').textContent = err.message || '初始化失敗';
    show('error');
  }
}

// ── Normal punch ──────────────────────────────────────
async function submit() {
  if (blocked) return;
  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.textContent = '打卡中...';

  try {
    const res = await fetch('/api/liff/punch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessToken, action, lat: coords?.lat, lng: coords?.lng, mealEat, mealKind })
    });
    let data;
    try { data = await res.json(); } catch(e) { throw new Error(`伺服器錯誤 HTTP ${res.status}`); }
    if (!res.ok) throw new Error(data.error || `打卡失敗 (${res.status})`);

    // 下班後有加班（平日晚於 17:00）→ 打完自動跳加班單
    const hh = Number((data.time || '').slice(0, 2));
    const [yy, mm, dd] = todayTaipei().split('-').map(Number);
    const dow = new Date(Date.UTC(yy, mm - 1, dd)).getUTCDay();
    const weekend = dow === 0 || dow === 6;
    if (!isCheckin && hh >= 17 && !weekend) {
      document.getElementById('success-title').textContent = '下班打卡成功！';
      document.getElementById('success-time').textContent = `時間：${data.time}`;
      document.getElementById('success-note').textContent = '請接著填加班單申報加班時段';
      show('success');
      setTimeout(() => openOvertime({ end: data.time }), 1800);
      return;
    }

    document.getElementById('success-title').textContent =
      data.title || (isCheckin ? '上班打卡成功！' : '下班打卡成功！');
    document.getElementById('success-time').textContent = `時間：${data.time}`;
    if (data.note) document.getElementById('success-note').textContent = data.note;
    show('success');
    setTimeout(() => tryClose(), 2500);
  } catch(err) {
    document.getElementById('error-msg').textContent = err.message;
    show('error');
    btn.disabled = false;
    btn.textContent = isCheckin ? '確認上班打卡' : '確認下班打卡';
  }
}

// ── Forgot punch ──────────────────────────────────────
function openForgot() {
  if (!userProfile) return;
  document.getElementById('forgot-avatar').src = userProfile.pictureUrl || '';
  document.getElementById('forgot-name').textContent = userProfile.displayName;

  const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
  document.getElementById('forgot-date').value = today;
  // action=forgot → default to checkin; action=checkout → checkout; otherwise checkin
  const forgotType = (action === 'checkout') ? 'checkout' : 'checkin';
  document.getElementById('forgot-type').value = forgotType;
  document.getElementById('forgot-reason').value = '';
  onForgotTypeChange();
  show('forgot');
}

const FORGOT_DEFAULTS = {
  checkin:     { time: '08:00', hint: '正常上班時間 08:00（超過視為遲到）' },
  checkout:    { time: '17:00', hint: '正常下班時間 17:00' },
  ot_checkin:  { time: '17:30', hint: '加班起算 17:30（加班費需另提加班單）' },
  ot_checkout: { time: '',      hint: '加班結束時間不限，請填寫實際下班時間' }
};

function onForgotTypeChange() {
  const type = document.getElementById('forgot-type').value;
  const d = FORGOT_DEFAULTS[type] || FORGOT_DEFAULTS.checkin;
  document.getElementById('forgot-time').value = d.time;
  document.getElementById('forgot-time-hint').textContent = d.hint;
}

async function submitForgot() {
  const type = document.getElementById('forgot-type').value;
  const date = document.getElementById('forgot-date').value;
  const requestedTime = document.getElementById('forgot-time').value;
  const reason = document.getElementById('forgot-reason').value.trim();

  if (!date) return alert('請選擇日期');
  if (!requestedTime) return alert('請填寫申請打卡時間');
  if (!reason) return alert('請說明忘記打卡的原因');

  const btn = document.getElementById('forgot-submit-btn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    const res = await fetch('/api/liff/punch-request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessToken, date, type, requestedTime, reason })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '提交失敗');

    show('forgot-success');
    setTimeout(() => tryClose(), 3000);
  } catch(err) {
    alert('提交失敗：' + err.message);
    btn.disabled = false;
    btn.textContent = '提交申請';
  }
}

// ── 加班單 ──────────────────────────────────────────
function todayTaipei() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
}

function openOvertime(prefill) {
  document.getElementById('ot-avatar').src = userProfile.pictureUrl || '';
  document.getElementById('ot-name').textContent = userProfile.displayName;
  document.getElementById('ot-date').value = todayTaipei();
  document.getElementById('ot-start').value = '17:00';
  if (prefill && prefill.end) document.getElementById('ot-end').value = prefill.end;
  const chips = document.getElementById('ot-reason-chips');
  chips.innerHTML = ['趕工出貨','生產排程','設備維修','盤點','臨時任務'].map(r =>
    `<button type="button" onclick="document.getElementById('ot-reason').value='${r}'" class="px-3 py-1.5 rounded-full text-sm border border-gray-200 text-gray-600 hover:bg-amber-50 hover:border-amber-300">${r}</button>`
  ).join('');
  updateOtHours();
  setOtMeal(true);   // 預設需要便當
  show('overtime');
}

let otMealNeed = true;
function setOtMeal(need) {
  otMealNeed = need;
  const on = 'bg-amber-500 text-white border-amber-500', off = 'border-gray-200 text-gray-600';
  document.getElementById('ot-meal-yes').className = `flex-1 py-2.5 rounded-lg text-sm font-medium border transition ${need ? on : off}`;
  document.getElementById('ot-meal-no').className = `flex-1 py-2.5 rounded-lg text-sm font-medium border transition ${!need ? on : off}`;
  document.getElementById('ot-meal-hint').textContent = need ? '公司會準備便當' : '不訂便當，加班≥2hr 補 80 元伙食津貼';
}

function updateOtHours() {
  const s = document.getElementById('ot-start').value, e = document.getElementById('ot-end').value;
  const el = document.getElementById('ot-hours');
  if (!s || !e) { el.textContent = ''; return; }
  const [sh,sm]=s.split(':').map(Number), [eh,em]=e.split(':').map(Number);
  const h = Math.round(((eh*60+em)-(sh*60+sm))/6)/10;
  el.textContent = h > 0 ? `加班時數：${h} 小時` : '⚠️ 結束時間需晚於開始時間';
  el.className = `text-xs font-medium ${h>0?'text-amber-600':'text-red-500'}`;
}

async function submitOvertime() {
  const date = document.getElementById('ot-date').value;
  const startTime = document.getElementById('ot-start').value;
  const endTime = document.getElementById('ot-end').value;
  const reason = document.getElementById('ot-reason').value.trim();
  if (!date || !startTime || !endTime) return alert('請選擇日期與時間');
  if (!reason) return alert('請填寫加班原因');
  const btn = document.getElementById('ot-submit-btn');
  btn.disabled = true; btn.textContent = '送出中...';
  try {
    const res = await fetch('/api/liff/overtime-request', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessToken, date, startTime, endTime, reason, meal: otMealNeed })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '送出失敗');
    show('forgot-success');
    setTimeout(() => tryClose(), 3000);
  } catch(err) {
    alert('送出失敗：' + err.message);
    btn.disabled = false; btn.textContent = '送出加班單';
  }
}

// ── 請假申請 ──────────────────────────────────────────
let leaveImageBase64 = null;

function openLeave() {
  document.getElementById('lv-avatar').src = userProfile.pictureUrl || '';
  document.getElementById('lv-name').textContent = userProfile.displayName;
  document.getElementById('lv-date').value = todayTaipei();
  leaveImageBase64 = null;
  document.getElementById('lv-image').value = '';
  document.getElementById('lv-image-preview').classList.add('hidden');
  onLeaveTypeChange();
  show('leave');
}

function onLeaveTypeChange() {
  const type = document.getElementById('lv-type').value;
  const box = document.getElementById('lv-doc-box');
  const hint = document.getElementById('lv-doc-hint');
  if (type === 'sick' || type === 'other') {
    box.classList.remove('hidden');
    hint.textContent = type === 'sick' ? '病假未附證明將全額扣薪' : '如有相關證明可附上';
  } else {
    box.classList.add('hidden');
  }
}

function previewLeaveImage() {
  const f = document.getElementById('lv-image').files[0];
  const prev = document.getElementById('lv-image-preview');
  if (!f) { leaveImageBase64 = null; prev.classList.add('hidden'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max = 1280; let w = img.width, h = img.height;
      if (w > max || h > max) { const r = Math.min(max/w, max/h); w = Math.round(w*r); h = Math.round(h*r); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      leaveImageBase64 = c.toDataURL('image/jpeg', 0.85);
      prev.src = leaveImageBase64; prev.classList.remove('hidden');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}

async function submitLeaveForm() {
  const type = document.getElementById('lv-type').value;
  const date = document.getElementById('lv-date').value;
  const reason = document.getElementById('lv-reason').value.trim();
  if (!date) return alert('請選擇請假日期');
  if (!reason) return alert('請填寫請假原因');
  const btn = document.getElementById('lv-submit-btn');
  btn.disabled = true; btn.textContent = '送出中...';
  try {
    const body = { accessToken, type, date, reason };
    if (leaveImageBase64) body.imageBase64 = leaveImageBase64;
    const res = await fetch('/api/liff/leave-request', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '送出失敗');
    show('forgot-success');
    setTimeout(() => tryClose(), 3000);
  } catch(err) {
    alert('送出失敗：' + err.message);
    btn.disabled = false; btn.textContent = '送出請假申請';
  }
}

init();
